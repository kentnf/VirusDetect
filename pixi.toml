[workspace]
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = "3.11.*"
pip = "*"
bwa = "*"
samtools = "*"
blast = "*"
hisat2 = "*"
spades = "*"

[tasks]
virusdetect = "PYTHONPATH=src python -m virusdetect"
test = "PYTHONPATH=src python -m unittest discover -s tests -v"
package = "python -m pip install build && python -m build"
package-db = "PYTHONPATH=src python -m virusdetect db bundle --path \"${VIRUSDETECT_PACKAGE_DB_PATH:?set VIRUSDETECT_PACKAGE_DB_PATH}\""
smoke-identify = "PYTHONPATH=src python -m virusdetect run test_data --db-path \"${VIRUSDETECT_SMOKE_DB_PATH:?set VIRUSDETECT_SMOKE_DB_PATH}\" --stop-after identify_virus -o vd_identify_release -t 2"
